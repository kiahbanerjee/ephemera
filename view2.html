<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Ephemera — Gallery</title>
    <link rel="stylesheet" href="view2.css">
    <link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html?skip=1" class="grid-view-link">Grid View</a>
            <span class="about-link">About</span>
            <h1 class="site-title">NYC EPHEMERA</h1>
            <nav class="filters">
                <a href="#" class="filter-link active" data-filter="ALL">ALL</a>
                <a href="#" class="filter-link" data-filter="POSTCARD">POSTCARD</a>
                <a href="#" class="filter-link" data-filter="MATCHBOX">MATCHBOX</a>
                <a href="#" class="filter-link" data-filter="STICKER">STICKER</a>
                <a href="#" class="filter-link" data-filter="OTHER">OTHER</a>
            </nav>
        </div>
    </header>

    <main>
        <button class="nav-arrow nav-left" id="nav-left">&#8249;</button>
        <div class="gallery-center">
            <img class="gallery-img" id="gallery-img" src="" alt="">
            <div class="gallery-detail" id="gallery-detail">
                <div class="detail-row"><span class="detail-label">OBJECT:</span><span class="detail-value" id="d-object"></span></div>
                <div class="detail-row"><span class="detail-label">LOCATION:</span><span class="detail-value" id="d-location"></span></div>
                <div class="detail-row"><span class="detail-label">PRICE:</span><span class="detail-value" id="d-price"></span></div>
                <div class="detail-row"><span class="detail-label">SUBMITTED BY:</span><span class="detail-value" id="d-by"></span></div>
                <div class="detail-row detail-note"><span class="detail-label">NOTE:</span><span class="detail-value" id="d-note"></span></div>
            </div>
        </div>
        <button class="nav-arrow nav-right" id="nav-right">&#8250;</button>
    </main>

    <div id="scroll-spacer"></div>

    <script>
        const hardcoded = [
            { src: 'manhatta 1.jpg',       object: 'Matchbox', location: 'Manhatta',          price: 'free', by: 'banek015@newschool.edu',    note: 'They have so many different collectables!' },
            { src: 'heros.jpg',            object: 'Postcard', location: 'Heros',             price: 'free', by: 'Community',                 note: '' },
            { src: 'monkey bar.jpg',       object: 'Postcard', location: 'Monkey Bar',        price: 'free', by: 'Community',                 note: 'Love this postcard!' },
            { src: 'The Corner Store.jpg', object: 'Matchbox', location: 'The Corner Store',  price: 'free', by: 'Community',                 note: 'I love the font, and just the overall design of the place and vibe.' },
            { src: 'polo bar.jpg',         object: 'Postcard', location: 'Polo Bar',          price: 'free', by: 'kiah.banerjee06@gmail.com', note: 'Try the burgers!' },
            { src: 'deux chats.jpg',       object: 'Matchbox', location: 'Deux Chats',        price: 'free', by: 'Community',                 note: 'Cute illustration.' },
            { src: 'The Standard.jpg',     object: 'Postcard', location: 'The Standard',      price: 'free', by: 'Community',                 note: '' },
            { src: 'manhatta 3.jpg',       object: 'Postcard', location: 'Manhatta',          price: 'free', by: 'kiah.banerjee06@gmail.com', note: '' },
            { src: 'bar madonna.jpg',      object: 'Matchbox', location: 'Bar Madonna',       price: 'free', by: 'Community',                 note: '' },
            { src: "jefrey's grocery.jpg", object: 'Matchbox', location: "Jeffrey's Grocery", price: 'free', by: 'Community',                 note: 'Cute sit out! Try this place out for sure!' },
            { src: 'manhatta 2.jpg',       object: 'Matchbox', location: 'Manhatta',          price: 'free', by: 'Community',                 note: '' },
        ];

        let allImages = [...hardcoded];
        let filtered = [...allImages];
        let currentIndex = 0;
        let activeFilter = 'ALL';
        let detailOpen = false;

        const galleryImg    = document.getElementById('gallery-img');
        const galleryDetail = document.getElementById('gallery-detail');
        const navLeft       = document.getElementById('nav-left');
        const navRight      = document.getElementById('nav-right');

        function showDetail(img) {
            document.getElementById('d-object').textContent   = img.object   || 'NA';
            document.getElementById('d-location').textContent = img.location || 'NA';
            document.getElementById('d-price').textContent    = img.price    || 'NA';
            document.getElementById('d-by').textContent       = img.by       || 'NA';
            document.getElementById('d-note').textContent     = img.note     || '';
        }

        function show(index) {
            if (!filtered.length) return;
            currentIndex = (index + filtered.length) % filtered.length;
            galleryDetail.classList.remove('open');
            detailOpen = false;
            setTimeout(() => {
                galleryImg.src = filtered[currentIndex].src;
                galleryImg.alt = filtered[currentIndex].object;
                galleryImg.style.opacity = '1';
                showDetail(filtered[currentIndex]);
            }, 150);
            navLeft.style.visibility  = filtered.length > 1 ? 'visible' : 'hidden';
            navRight.style.visibility = filtered.length > 1 ? 'visible' : 'hidden';
        }

        galleryImg.addEventListener('click', () => {
            detailOpen = true;
            galleryDetail.classList.add('open');
            galleryImg.style.opacity = '0';
        });

        galleryDetail.addEventListener('click', () => {
            detailOpen = false;
            galleryDetail.classList.remove('open');
            galleryImg.style.opacity = '1';
        });

        function applyFilter(f) {
            activeFilter = f;
            filtered = f === 'ALL' ? [...allImages] : allImages.filter(img => img.object.toUpperCase() === f);
            show(0);
        }

        navLeft.addEventListener('click',  () => show(currentIndex - 1));
        navRight.addEventListener('click', () => show(currentIndex + 1));

        document.querySelectorAll('.filter-link').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('.filter-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                applyFilter(link.dataset.filter);
            });
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') show(currentIndex + 1);
            if (e.key === 'ArrowLeft')  show(currentIndex - 1);
        });

        async function loadSheetImages() {
            try {
                const url = 'https://docs.google.com/spreadsheets/d/1D0gaICwWj3kSvwjrA_nxVazcgKTmSy9Nwd5vfh6_FtI/gviz/tq?tqx=out:json';
                const res  = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const sheetImages = [];
                json.table.rows.forEach(row => {
                    const cols = row.c;
                    const src  = cols[5]?.v?.trim();
                    if (!src || !src.startsWith('http')) return;
                    sheetImages.push({
                        src,
                        object:   cols[0]?.v || '',
                        location: cols[1]?.v || '',
                        price:    cols[2]?.v || 'NA',
                        by:       cols[3]?.v || 'Community',
                        note:     cols[4]?.v || '',
                    });
                });
                allImages = [...sheetImages.reverse(), ...hardcoded];
                applyFilter(activeFilter);
            } catch (e) {}
        }

        show(0);
        loadSheetImages();

        // Scroll-driven compact header
        const headerEl    = document.querySelector('header');
        const headerInner = document.querySelector('.header-inner');
        const siteTitleEl = document.querySelector('.site-title');
        const mainEl      = document.querySelector('main');
        const maxScroll   = 400;

        function positionMain() {
            mainEl.style.top = headerEl.offsetHeight + 'px';
        }
        positionMain();

        function updateLayout() {
            const p = Math.min(window.scrollY / maxScroll, 1);
            headerInner.style.paddingTop    = (50 - 38 * p) + 'px';
            headerInner.style.paddingBottom = (28 - 22 * p) + 'px';
            headerInner.style.gap           = (20 - 14 * p) + 'px';
            siteTitleEl.style.fontSize      = (90 - 50 * p) + 'px';
            galleryImg.style.maxHeight      = (58 + 30 * p) + 'vh';
            galleryImg.style.maxWidth       = (55 + 35 * p) + 'vw';
            document.querySelectorAll('.filter-link').forEach(l => l.style.fontSize = (12 - 4 * p) + 'px');
            document.querySelectorAll('.grid-view-link, .about-link').forEach(l => l.style.fontSize = (12 - 2 * p) + 'px');
            positionMain();
        }

        window.addEventListener('scroll', updateLayout);
    </script>
</body>
</html>
