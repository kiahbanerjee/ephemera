<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Ephemera</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <filter id="ink-filter">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
</svg>
<div id="loading">
    <div id="loading-images">
        <img class="splash-img" src="manhatta 3.jpg" alt="">
        <img class="splash-img" src="polo bar.jpg" alt="">
        <img class="splash-img" src="The Corner Store.jpg" alt="">
        <img class="splash-img" src="bar madonna.jpg" alt="">
        <img class="splash-img" src="monkey bar.jpg" alt="">
        <img class="splash-img" src="manhatta 2.jpg" alt="">
        <img class="splash-img" src="deux chats.jpg" alt="">
        <img class="splash-img" src="heros.jpg" alt="">
        <img class="splash-img" src="clem.jpg" alt="">
        <img class="splash-img" src="leons.jpg" alt="">
    </div>
    <h1 id="loading-title">NYC EPHEMERA</h1>
</div>

    <img src="interactiomn.png" class="corner-decor corner-decor-left" alt="">
    <img src="interactiomn.png" class="corner-decor corner-decor-right" alt="">

    <header>
        <div class="header-inner">
            <a href="about.html" class="about-link">HISTORY</a>
            <nav class="filters">
                <a href="#" class="filter-link active">ALL</a>
                <a href="#" class="filter-link">POSTCARD</a>
                <a href="#" class="filter-link">MATCHBOX</a>
                <a href="#" class="filter-link">STICKER</a>
                <a href="#" class="filter-link">OTHER</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="grid-inner">
        <div class="grid">
            <div class="card card-submit" id="submit-card">
                <span class="submit-plus">+</span>
            </div>
            <div class="card" data-object="Matchbox" data-location="Manhatta" data-price="free" data-by="banek015@newschool.edu" data-note="They have so many different collectables!"><img src="manhatta 1.jpg" alt="Manhatta 1"></div>
            <div class="card" data-object="Postcard" data-location="Heros" data-price="free" data-by="Community" data-note=""><img src="heros.jpg" alt="Heroes"></div>
            <div class="card" data-object="Postcard" data-location="Monkey Bar" data-price="free" data-by="Community" data-note="Love this postcard!"><img src="monkey bar.jpg" alt="Monkey Bar"></div>
            <div class="card" data-object="Matchbox" data-location="The Corner Store" data-price="free" data-by="Community" data-note="I love the font, and just the overall design of the place and vibe."><img src="The Corner Store.jpg" alt="The Corner Store"></div>
            <div class="card" data-object="Postcard" data-location="Polo Bar" data-price="free" data-by="kiah.banerjee06@gmail.com" data-note="Try the burgers!"><img src="polo bar.jpg" alt="Polo Bar"></div>
            <div class="card" data-object="Matchbox" data-location="Deux Chats" data-price="free" data-by="Community" data-note="Cute illustration."><img src="deux chats.jpg" alt="Deux Chats"></div>
            <div class="card card-metro" data-object="Other" data-location="New York City" data-price="$1" data-by="Community" data-note="we miss you :("><img src="metro card.png" alt="Metro Card"></div>
            <div class="card" data-object="Postcard" data-location="The Standard" data-price="free" data-by="Community" data-note=""><img src="The Standard.jpg" alt="The Standard"></div>
            <div class="card" data-object="Postcard" data-location="Manhatta" data-price="free" data-by="kiah.banerjee06@gmail.com" data-note=""><img src="manhatta 3.jpg" alt="Manhatta 3"></div>
            <div class="card" data-object="Matchbox" data-location="Bar Madonna" data-price="free" data-by="Community" data-note=""><img src="bar madonna.jpg" alt="Bar Madonna"></div>
            <div class="card" data-object="Matchbox" data-location="Jeffrey's Grocery" data-price="free" data-by="Community" data-note="Cute sit out! Try this place out for sure!"><img src="jefrey's grocery.jpg" alt="Jeffrey's Grocery"></div>
            <div class="card" data-object="Matchbox" data-location="Manhatta" data-price="free" data-by="Community" data-note=""><img src="manhatta 2.jpg" alt="Manhatta 2"></div>
        </div>
        </div>
    </main>


<!-- Submission -->
<div class="modal-overlay" id="modal-overlay">
    <form class="modal" id="submit-form">
        <button type="button" id="modal-close">✕</button>

        <div class="modal-left">
            <input type="file" accept="image/*" id="form-image">
            <label for="form-image" class="upload-label" id="upload-label">
                <span class="upload-title">UPLOAD IMAGE</span>
            </label>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-right">
            <div class="form-field">
                <label class="form-label">CATEGORY:</label>
                <select class="form-input" id="form-category" style="display:none">
                    <option value=""></option>
                    <option value="Postcard">Postcard</option>
                    <option value="Matchbox">Matchbox</option>
                    <option value="Sticker">Sticker</option>
                    <option value="Other">Other</option>
                </select>
                <div class="custom-select" id="custom-category">
                    <div class="custom-select-trigger"><span class="custom-select-value"></span></div>
                    <div class="custom-select-options">
                        <div class="custom-select-option" data-value="Postcard">Postcard</div>
                        <div class="custom-select-option" data-value="Matchbox">Matchbox</div>
                        <div class="custom-select-option" data-value="Sticker">Sticker</div>
                        <div class="custom-select-option" data-value="Other">Other</div>
                    </div>
                </div>
            </div>
            <div class="form-field">
                <label class="form-label">LOCATION:</label>
                <input type="text" class="form-input" id="form-location">
            </div>
            <div class="form-field">
                <label class="form-label">PRICE:</label>
                <input type="text" class="form-input" id="form-price">
            </div>
            <div class="form-field">
                <label class="form-label">A NOTE <span class="form-label-opt">(IF YOU WANT &lt;3):</span></label>
                <input type="text" class="form-input" id="form-note">
            </div>
            <button type="submit" class="form-submit">SUBMIT</button>
        </div>
    </form>
</div>



<div id="lightbox" class="lightbox-overlay">
    <div id="lightbox-card-container" class="lightbox-card-container"></div>
</div>

<script src="main.js"></script>
</body>
</html>
