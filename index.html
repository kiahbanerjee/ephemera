<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Ephemera</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
</head>
<body>
<div id="loading">
    <div id="loading-images"></div>
    <h1 id="loading-title">NYC EPHEMERA</h1>
</div>

    <header>
        <div class="header-inner">
            <h1 class="site-title">NYC EPHEMERA</h1>
<nav class="filters">
                <a href="#" class="filter-link active">ALL</a>
                <a href="#" class="filter-link">POSTCARD</a>
                <a href="#" class="filter-link">MATCHBOX</a>
                <a href="#" class="filter-link">STICKER</a>
                <a href="#" class="filter-link">OTHER</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="grid-inner">
        <div class="grid">
            <div class="card card-submit" id="submit-card">
                <span class="submit-plus">+</span>
            </div>
            <div class="card" data-object="Matchbox" data-location="Manhattan" data-price="NA" data-by="NA" data-note=""><img src="manhatta 1.jpg" alt="Manhatta 1"></div>
            <div class="card" data-object="Postcard" data-location="SoHo" data-price="NA" data-by="NA" data-note=""><img src="heros.jpg" alt="Heroes"></div>
            <div class="card" data-object="Postcard" data-location="Upper East Side" data-price="NA" data-by="NA" data-note=""><img src="monkey bar.jpg" alt="Monkey Bar"></div>
            <div class="card" data-object="Matchbox" data-location="Broadway" data-price="NA" data-by="NA" data-note=""><img src="The Corner Store.jpg" alt="The Corner Store"></div>
            <div class="card" data-object="Postcard" data-location="Midtown" data-price="NA" data-by="NA" data-note=""><img src="polo bar.jpg" alt="Polo Bar"></div>
            <div class="card" data-object="Matchbox" data-location="West Village" data-price="NA" data-by="NA" data-note=""><img src="deux chats.jpg" alt="Deux Chats"></div>
            <div class="card" data-object="Postcard" data-location="Meatpacking" data-price="NA" data-by="NA" data-note=""><img src="The Standard.jpg" alt="The Standard"></div>
            <div class="card" data-object="Postcard" data-location="Manhattan" data-price="NA" data-by="NA" data-note=""><img src="manhatta 3.jpg" alt="Manhatta 3"></div>
            <div class="card" data-object="Matchbox" data-location="Lower East Side" data-price="NA" data-by="NA" data-note=""><img src="bar madonna.jpg" alt="Bar Madonna"></div>
            <div class="card" data-object="Matchbox" data-location="West Village" data-price="NA" data-by="NA" data-note=""><img src="jefrey's grocery.jpg" alt="Jeffrey's Grocery"></div>
            <div class="card" data-object="Matchbox" data-location="Manhattan" data-price="NA" data-by="NA" data-note=""><img src="manhatta 2.jpg" alt="Manhatta 2"></div>
        </div>
        </div>
    </main>


<!-- Submission -->
<div class="modal-overlay" id="modal-overlay">
    <form class="modal" id="submit-form">

        <div class="modal-left">
            <input type="file" accept="image/*" id="form-image" required>
            <label for="form-image" class="upload-label">
                <span class="upload-title">UPLOAD IMAGE</span>
                <span class="upload-sub">Drag and Drop or<br>Click to browse your device</span>
            </label>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-right">
            <div class="form-field">
                <label class="form-label">CATEGORY:</label>
                <select class="form-input" id="form-category" required>
                    <option value="" disabled selected></option>
                    <option value="Postcard">Postcard</option>
                    <option value="Matchbox">Matchbox</option>
                    <option value="Sticker">Sticker</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-field" id="custom-category-field" style="display:none;">
                <label class="form-label">SPECIFY CATEGORY:</label>
                <input type="text" class="form-input" id="form-category-custom" placeholder="e.g. Flyer">
            </div>
            <div class="form-field">
                <label class="form-label">LOCATION:</label>
                <input type="text" class="form-input" id="form-location" required>
            </div>
            <div class="form-field">
                <label class="form-label">PRICE:</label>
                <input type="text" class="form-input" id="form-price">
            </div>
            <div class="form-field">
                <label class="form-label">YOUR EMAIL <span class="form-label-opt">(OPTIONAL):</span></label>
                <input type="email" class="form-input" id="form-email">
            </div>
            <div class="form-field">
                <label class="form-label">A NOTE:</label>
                <input type="text" class="form-input" id="form-note">
            </div>
            <button type="submit" class="form-submit">SUBMIT</button>
        </div>
    </form>
</div>

<div id="about-panel">
    <div id="about-tab">ABOUT</div>
    <div id="about-content">
        <p>NYC Ephemera is a community archive of found objects from New York City — matchbooks, postcards, stickers, and more. Collected and submitted by people who love this city.</p>
    </div>
</div>

<button id="back-to-top">↑</button>

<script src="main.js"></script>
</body>
</html>
