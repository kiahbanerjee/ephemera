<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Ephemera</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
<link rel="stylesheet" href="https://use.typekit.net/sfz3pyh.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <h1 class="site-title">NYC EPHEMERA</h1>
<nav class="filters">
                <a href="#" class="filter-link active">ALL</a>
                <a href="#" class="filter-link">POSTCARD</a>
                <a href="#" class="filter-link">MATCHBOX</a>
                <a href="#" class="filter-link">STICKER</a>
                <a href="#" class="filter-link">OTHER</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="grid-inner">
        <div class="grid">
            <div class="card" data-object="Postcard" data-location="Manhattan" data-price="NA" data-by="NA" data-note=""><img src="manhatta 1.jpg" alt="Manhatta 1"></div>
            <div class="card" data-object="Matchbox" data-location="SoHo" data-price="NA" data-by="NA" data-note=""><img src="heros.jpg" alt="Heroes"></div>
            <div class="card" data-object="Matchbox" data-location="Upper East Side" data-price="NA" data-by="NA" data-note=""><img src="monkey bar.jpg" alt="Monkey Bar"></div>
            <div class="card" data-object="Matchbox" data-location="Broadway" data-price="NA" data-by="NA" data-note=""><img src="The Corner Store.jpg" alt="The Corner Store"></div>
            <div class="card" data-object="Matchbox" data-location="Midtown" data-price="NA" data-by="NA" data-note=""><img src="polo bar.jpg" alt="Polo Bar"></div>
            <div class="card" data-object="Matchbox" data-location="West Village" data-price="NA" data-by="NA" data-note=""><img src="deux chats.jpg" alt="Deux Chats"></div>
            <div class="card" data-object="Matchbox" data-location="Meatpacking" data-price="NA" data-by="NA" data-note=""><img src="The Standard.jpg" alt="The Standard"></div>
            <div class="card" data-object="Postcard" data-location="Manhattan" data-price="NA" data-by="NA" data-note=""><img src="manhatta 3.jpg" alt="Manhatta 3"></div>
            <div class="card" data-object="Sticker" data-location="Lower East Side" data-price="NA" data-by="NA" data-note=""><img src="bar madonna.jpg" alt="Bar Madonna"></div>
            <div class="card" data-object="Matchbox" data-location="West Village" data-price="NA" data-by="NA" data-note=""><img src="jefrey's grocery.jpg" alt="Jeffrey's Grocery"></div>
            <div class="card" data-object="Postcard" data-location="Manhattan" data-price="NA" data-by="NA" data-note=""><img src="manhatta 2.jpg" alt="Manhatta 2"></div>
        </div>
        </div>
    </main>


<script>
    // Filter links
    document.querySelectorAll('.filter-link').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            document.querySelectorAll('.filter-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
        });
    });

    // Build detail panels and toggle on click
    document.querySelectorAll('.card').forEach(card => {
        const detail = document.createElement('div');
        detail.className = 'detail';
        detail.innerHTML = `
            <div class="detail-row">
                <span class="detail-label">OBJECT:</span>
                <span class="detail-value">${card.dataset.object || 'NA'}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">LOCATION:</span>
                <span class="detail-value">${card.dataset.location || 'NA'}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">PRICE:</span>
                <span class="detail-value">${card.dataset.price || 'NA'}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">SUBMITTED BY:</span>
                <span class="detail-value">${card.dataset.by || 'NA'}</span>
            </div>
            <div class="detail-row detail-note">
                <span class="detail-label">Note:</span>
                <span class="detail-value">${card.dataset.note || ''}</span>
            </div>
        `;
        card.appendChild(detail);

        card.addEventListener('click', () => {
            card.classList.toggle('flipped');
        });
    });
</script>
</body>
</html>
